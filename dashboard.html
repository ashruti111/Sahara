<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAKSHYAK - Command Center Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #0a0c10;
      color: #fff;
      overflow: hidden;
    }

    /* Layout */
    .dashboard {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 380px;
      background: rgba(13, 17, 23, 0.95);
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(0, 230, 118, 0.1);
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #00e676, #00b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .logo-sub {
      font-size: 11px;
      color: #8892b0;
      margin-top: 4px;
      letter-spacing: 2px;
    }

    .stats {
      display: flex;
      gap: 16px;
      margin-top: 16px;
    }

    .stat-card {
      flex: 1;
      background: rgba(22, 27, 34, 0.8);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
    }

    .stat-value.active { color: #ff1744; }
    .stat-value.total { color: #00b0ff; }
    .stat-value.resolved { color: #00e676; }

    .stat-label {
      font-size: 10px;
      color: #8892b0;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px 12px;
      background: rgba(0, 230, 118, 0.1);
      border-radius: 8px;
      font-size: 12px;
    }

    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00e676;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Alerts List */
    .alerts-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .alerts-container::-webkit-scrollbar {
      width: 4px;
    }

    .alerts-container::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    .alerts-container::-webkit-scrollbar-thumb {
      background: #00e676;
      border-radius: 2px;
    }

    .alert-card {
      background: rgba(22, 27, 34, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .alert-card:hover {
      border-color: rgba(0, 230, 118, 0.3);
      transform: translateX(-4px);
    }

    .alert-card.active {
      border-left: 3px solid #ff1744;
    }

    .alert-card.resolved {
      opacity: 0.5;
    }

    .alert-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .alert-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .alert-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff1744, #ff6090);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
    }

    .alert-name {
      font-weight: 600;
      font-size: 15px;
    }

    .alert-phone {
      font-size: 11px;
      color: #8892b0;
      margin-top: 2px;
    }

    .alert-time {
      font-size: 10px;
      color: #8892b0;
      font-family: monospace;
    }

    .alert-location {
      font-size: 11px;
      color: #8892b0;
      margin-bottom: 12px;
      font-family: monospace;
    }

    .alert-photo {
      max-width: 100%;
      border-radius: 8px;
      margin-bottom: 12px;
      cursor: pointer;
      max-height: 150px;
      object-fit: cover;
    }

    .alert-contacts {
      font-size: 11px;
      color: #8892b0;
      margin-bottom: 12px;
    }

    .alert-actions {
      display: flex;
      gap: 8px;
    }

    .btn-action {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-locate {
      background: rgba(0, 176, 255, 0.1);
      border: 1px solid rgba(0, 176, 255, 0.3);
      color: #00b0ff;
    }

    .btn-resolve {
      background: rgba(0, 230, 118, 0.1);
      border: 1px solid rgba(0, 230, 118, 0.3);
      color: #00e676;
    }

    .btn-locate:hover {
      background: rgba(0, 176, 255, 0.2);
    }

    .btn-resolve:hover {
      background: rgba(0, 230, 118, 0.2);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #8892b0;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    /* Map Container */
    .map-container {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .map-overlay {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(13, 17, 23, 0.9);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 11px;
      font-family: monospace;
      z-index: 1000;
      border: 1px solid rgba(0, 230, 118, 0.2);
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 80vh;
      border-radius: 8px;
    }

    .lightbox-close {
      margin-top: 20px;
      padding: 10px 24px;
      background: rgba(22, 27, 34, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    /* Notification Banner */
    .notification-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #ff1744, #b71c1c);
      color: #fff;
      text-align: center;
      padding: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
      z-index: 1500;
    }

    .notification-banner.show {
      transform: translateY(0);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        position: absolute;
        right: -100%;
        transition: right 0.3s ease;
        height: 100%;
        z-index: 100;
      }
      
      .sidebar.open {
        right: 0;
      }
      
      .map-container {
        width: 100%;
      }
      
      .menu-toggle {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 101;
        background: rgba(13, 17, 23, 0.9);
        border: 1px solid rgba(0, 230, 118, 0.3);
        border-radius: 8px;
        padding: 10px;
        cursor: pointer;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">RAKSHYAK</div>
        <div class="logo-sub">COMMAND CENTER</div>
        
        <div class="stats">
          <div class="stat-card">
            <div class="stat-value active" id="activeCount">0</div>
            <div class="stat-label">ACTIVE</div>
          </div>
          <div class="stat-card">
            <div class="stat-value total" id="totalCount">0</div>
            <div class="stat-label">TOTAL</div>
          </div>
          <div class="stat-card">
            <div class="stat-value resolved" id="resolvedCount">0</div>
            <div class="stat-label">RESOLVED</div>
          </div>
        </div>
        
        <div class="connection-status">
          <div class="connection-dot" id="connDot"></div>
          <span id="connStatus">Connecting to server...</span>
        </div>
      </div>
      
      <div class="alerts-container" id="alertsContainer">
        <div class="empty-state">
          <div class="empty-icon">🛡️</div>
          <div>No active alerts</div>
          <div style="font-size: 11px; margin-top: 8px;">Monitoring for emergencies...</div>
        </div>
      </div>
    </div>
    
    <div class="map-container">
      <div id="map"></div>
      <div class="map-overlay" id="mapInfo">
        Ready • Monitoring
      </div>
    </div>
  </div>
  
  <div class="notification-banner" id="notificationBanner">
    🚨 NEW SOS ALERT RECEIVED 🚨
  </div>
  
  <div class="lightbox" id="lightbox">
    <img id="lightboxImg" src="" alt="Evidence">
    <button class="lightbox-close" onclick="closeLightbox()">Close</button>
  </div>
  
  <!-- Mobile menu toggle -->
  <div class="menu-toggle" id="menuToggle" style="display: none;">☰</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // State
    let map;
    let markers = new Map();
    let alerts = [];
    let ws;
    let audioContext;
    let audioEnabled = true;
    
    const SERVER_URL = window.location.origin;
    
    // Initialize Map
    function initMap() {
      map = L.map('map').setView([27.7172, 85.3240], 13);
      
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);
    }
    
    // WebSocket Connection
    function connectWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}`;
      
      ws = new WebSocket(wsUrl);
      
      ws.onopen = () => {
        console.log('WebSocket connected');
        ws.send(JSON.stringify({ type: 'HELLO', role: 'dashboard' }));
        updateConnectionStatus(true);
        loadExistingAlerts();
      };
      
      ws.onclose = () => {
        console.log('WebSocket disconnected');
        updateConnectionStatus(false);
        setTimeout(connectWebSocket, 3000);
      };
      
      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          handleWebSocketMessage(data);
        } catch (err) {
          console.error('WebSocket message error:', err);
        }
      };
      
      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
      };
    }
    
    function handleWebSocketMessage(data) {
      switch (data.type) {
        case 'SOS_ALERT':
          addAlert(data);
          break;
        case 'SOS_CANCEL':
          handleCancel(data.userId);
          break;
        case 'ALERT_RESOLVED':
          handleResolve(data.alertId);
          break;
        case 'CONNECTED':
          console.log('Connected to server');
          break;
      }
    }
    
    // Load existing alerts from server
    async function loadExistingAlerts() {
      try {
        const response = await fetch(`${SERVER_URL}/api/alerts/active`);
        const activeAlerts = await response.json();
        
        for (const alert of activeAlerts) {
          if (!alerts.find(a => a.id === alert.id)) {
            addAlert(alert);
          }
        }
      } catch (err) {
        console.error('Failed to load alerts:', err);
      }
    }
    
    // Add alert to dashboard
    function addAlert(alertData) {
      // Check for duplicate
      if (alerts.find(a => a.id === alertData.id)) return;
      
      const alert = {
        id: alertData.id,
        userId: alertData.userId,
        userName: alertData.userName,
        userPhone: alertData.userPhone,
        location: alertData.location,
        photo: alertData.photo,
        contacts: alertData.contacts || [],
        timestamp: alertData.timestamp,
        resolved: false
      };
      
      alerts.unshift(alert);
      renderAlerts();
      updateStats();
      updateMap();
      showNotification();
      playAlertSound();
      
      // Auto-center map on new alert
      if (alert.location) {
        map.setView([alert.location.lat, alert.location.lng], 15);
      }
    }
    
    function handleCancel(userId) {
      const alert = alerts.find(a => a.userId === userId && !a.resolved);
      if (alert) {
        alert.resolved = true;
        renderAlerts();
        updateStats();
        updateMap();
      }
    }
    
    async function handleResolve(alertId) {
      const alert = alerts.find(a => a.id === alertId);
      if (alert) {
        alert.resolved = true;
        renderAlerts();
        updateStats();
        updateMap();
        
        // Notify server
        try {
          await fetch(`${SERVER_URL}/api/alerts/${alertId}/resolve`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          });
        } catch (err) {
          console.error('Failed to resolve alert on server:', err);
        }
      }
    }
    
    function resolveAlertLocally(alertId) {
      const alert = alerts.find(a => a.id === alertId);
      if (alert && !alert.resolved) {
        alert.resolved = true;
        renderAlerts();
        updateStats();
        updateMap();
        
        // Send via WebSocket
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'RESOLVE_ALERT',
            alertId: alertId
          }));
        }
      }
    }
    
    // Render alerts in sidebar
    function renderAlerts() {
      const container = document.getElementById('alertsContainer');
      const activeAlerts = alerts.filter(a => !a.resolved);
      const resolvedAlerts = alerts.filter(a => a.resolved);
      
      if (alerts.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🛡️</div>
            <div>No alerts received</div>
            <div style="font-size: 11px; margin-top: 8px;">System is monitoring</div>
          </div>
        `;
        return;
      }
      
      let html = '';
      
      if (activeAlerts.length > 0) {
        html += `<div style="margin-bottom: 16px;"><strong>🟡 ACTIVE (${activeAlerts.length})</strong></div>`;
        activeAlerts.forEach(alert => {
          html += renderAlertCard(alert);
        });
      }
      
      if (resolvedAlerts.length > 0) {
        html += `<div style="margin-top: 16px; margin-bottom: 16px;"><strong>✅ RESOLVED (${resolvedAlerts.length})</strong></div>`;
        resolvedAlerts.slice(0, 10).forEach(alert => {
          html += renderAlertCard(alert, true);
        });
      }
      
      container.innerHTML = html;
    }
    
    function renderAlertCard(alert, resolved = false) {
      const time = new Date(alert.timestamp).toLocaleTimeString();
      const date = new Date(alert.timestamp).toLocaleDateString();
      const locationText = alert.location 
        ? `${alert.location.lat.toFixed(5)}, ${alert.location.lng.toFixed(5)}`
        : 'Location unknown';
      
      return `
        <div class="alert-card ${!resolved ? 'active' : 'resolved'}" onclick="focusOnAlert('${alert.id}')">
          <div class="alert-header">
            <div class="alert-user">
              <div class="alert-avatar">${alert.userName?.[0] || '?'}</div>
              <div>
                <div class="alert-name">${escapeHtml(alert.userName)}</div>
                <div class="alert-phone">${escapeHtml(alert.userPhone)}</div>
              </div>
            </div>
            <div class="alert-time">${time}<br>${date}</div>
          </div>
          
          <div class="alert-location">📍 ${locationText}</div>
          
          ${alert.photo ? `<img class="alert-photo" src="${alert.photo}" alt="Evidence photo" onclick="event.stopPropagation(); openLightbox('${alert.photo}')">` : ''}
          
          ${alert.contacts && alert.contacts.length > 0 ? `
            <div class="alert-contacts">
              📞 Emergency Contacts:<br>
              ${alert.contacts.map(c => `&nbsp;&nbsp;• ${escapeHtml(c.name)}: ${escapeHtml(c.phone)}`).join('<br>')}
            </div>
          ` : ''}
          
          ${!resolved ? `
            <div class="alert-actions">
              <button class="btn-action btn-locate" onclick="event.stopPropagation(); focusOnAlert('${alert.id}')">📍 Locate</button>
              <button class="btn-action btn-resolve" onclick="event.stopPropagation(); resolveAlertLocally('${alert.id}')">✓ Resolve</button>
            </div>
          ` : ''}
        </div>
      `;
    }
    
    // Update map markers
    function updateMap() {
      // Clear existing markers
      markers.forEach((marker, id) => {
        map.removeLayer(marker);
      });
      markers.clear();
      
      // Add markers for active alerts
      const activeAlerts = alerts.filter(a => !a.resolved && a.location);
      
      activeAlerts.forEach(alert => {
        const marker = L.marker([alert.location.lat, alert.location.lng], {
          icon: L.divIcon({
            className: 'custom-marker',
            html: `
              <div style="
                background: #ff1744;
                color: white;
                padding: 4px 10px;
                border-radius: 20px;
                font-size: 12px;
                font-weight: bold;
                white-space: nowrap;
                box-shadow: 0 2px 8px rgba(0,0,0,0.3);
                border: 2px solid white;
              ">
                🚨 ${escapeHtml(alert.userName)}
              </div>
            `,
            iconSize: [100, 30],
            iconAnchor: [50, 15]
          })
        }).addTo(map);
        
        marker.bindPopup(`
          <b>${escapeHtml(alert.userName)}</b><br>
          📞 ${escapeHtml(alert.userPhone)}<br>
          📍 ${alert.location.lat.toFixed(5)}, ${alert.location.lng.toFixed(5)}<br>
          🕐 ${new Date(alert.timestamp).toLocaleString()}
        `);
        
        markers.set(alert.id, marker);
      });
      
      const mapInfo = document.getElementById('mapInfo');
      if (activeAlerts.length > 0) {
        mapInfo.textContent = `📍 ${activeAlerts.length} active emergency(s) • Click markers for details`;
      } else {
        mapInfo.textContent = '✅ No active emergencies • System monitoring';
      }
    }
    
    function focusOnAlert(alertId) {
      const alert = alerts.find(a => a.id === alertId);
      if (alert && alert.location) {
        map.setView([alert.location.lat, alert.location.lng], 16);
        const marker = markers.get(alertId);
        if (marker) {
          marker.openPopup();
        }
      }
    }
    
    // Update statistics
    function updateStats() {
      const active = alerts.filter(a => !a.resolved).length;
      const total = alerts.length;
      const resolved = alerts.filter(a => a.resolved).length;
      
      document.getElementById('activeCount').textContent = active;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('resolvedCount').textContent = resolved;
    }
    
    function updateConnectionStatus(connected) {
      const dot = document.getElementById('connDot');
      const status = document.getElementById('connStatus');
      
      if (connected) {
        dot.style.background = '#00e676';
        status.textContent = 'Connected • Real-time monitoring';
      } else {
        dot.style.background = '#ff9800';
        status.textContent = 'Reconnecting...';
      }
    }
    
    function showNotification() {
      const banner = document.getElementById('notificationBanner');
      banner.classList.add('show');
      setTimeout(() => {
        banner.classList.remove('show');
      }, 4000);
    }
    
    function playAlertSound() {
      if (!audioEnabled) return;
      
      try {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        const beep = () => {
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          osc.connect(gain);
          gain.connect(audioContext.destination);
          osc.frequency.value = 880;
          osc.type = 'sine';
          gain.gain.value = 0.3;
          osc.start();
          gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.5);
          osc.stop(audioContext.currentTime + 0.5);
        };
        
        beep();
        setTimeout(beep, 300);
        setTimeout(beep, 600);
      } catch (err) {
        console.error('Audio error:', err);
      }
    }
    
    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('open');
    }
    
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    // Mobile menu toggle
    function initMobileMenu() {
      const toggle = document.getElementById('menuToggle');
      const sidebar = document.getElementById('sidebar');
      
      if (window.innerWidth <= 768) {
        toggle.style.display = 'block';
        toggle.onclick = () => {
          sidebar.classList.toggle('open');
        };
        
        // Close sidebar when clicking on map
        document.getElementById('map').addEventListener('click', () => {
          sidebar.classList.remove('open');
        });
      }
    }
    
    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
      initMap();
      connectWebSocket();
      initMobileMenu();
      
      // Enable audio on first user interaction
      document.body.addEventListener('click', () => {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioContext.state === 'suspended') {
          audioContext.resume();
        }
      }, { once: true });
    });
    
    window.addEventListener('resize', initMobileMenu);
  </script>
</body>
</html>
